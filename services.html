<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Services — Beneplus</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#EEEAE0" />
<meta name="description" content="Eight practices, sixty-six services. Mobile, web, software, blockchain, product, games, cloud and emerging tech — built by a small team that ships." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-padding-top: 80px; }
  body {
    background: #EEEAE0;
    font-family: "Plus Jakarta Sans", system-ui, sans-serif;
    color: #0A0E18;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: #FF5A35; color: #EEEAE0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="brand.jsx"></script>
<script type="text/babel" src="site.jsx"></script>
<script type="text/babel">

const CATEGORIES = [
  {
    icon: 'mobile',
    anchor: 'mobile', no: '01', title: 'Mobile apps',
    body: 'Native, hybrid, and cross-platform mobile work. Fifteen platforms, one team — picked by what your users actually run.',
    items: [
      'iOS', 'Android', 'eCommerce', 'visionOS', 'Enterprise',
      'Low Code / No Code', 'Progressive Web App', 'Web3', 'OnDemand', 'Cross Platform',
      'Flutter', 'Hybrid', 'Ionic', 'Sencha', 'NativeScript',
    ],
    bg: C.bone, fg: C.slate,
  },
  {
    icon: 'emerging',
    anchor: 'emerging', no: '02', title: 'Emerging tech',
    body: 'New surfaces, new sensors, new intelligence. We build production-grade apps for AR, VR, IoT, AI, and Metaverse contexts.',
    items: ['AR', 'VR', 'Metaverse', 'IoT', 'AI'],
    bg: C.slate, fg: C.bone,
  },
  {
    icon: 'software',
    anchor: 'software', no: '03', title: 'Software development',
    body: 'When off-the-shelf doesn\'t fit. Custom backends, integrations, product engineering, and the long-term care that keeps it shipping.',
    items: [
      'Software Consulting', 'System Integration', 'Software Design', 'Software Testing',
      'Software Maintenance & Support', 'Software Product Development',
      'Custom API Development', 'IoT Software Development', 'Web App Development',
    ],
    bg: C.bone, fg: C.slate,
  },
  {
    icon: 'web',
    anchor: 'web', no: '04', title: 'Web development',
    body: 'Marketing sites, commerce, B2B portals. From custom-built to platformed — we pick the right stack and ship it fast.',
    items: ['Custom Web Development', 'eCommerce', 'Magento', 'WooCommerce', 'B2B', 'Shopify', 'Headless'],
    bg: C.slate, fg: C.bone,
  },
  {
    icon: 'blockchain',
    anchor: 'blockchain', no: '05', title: 'Blockchain & Web3',
    body: 'Protocol, on-chain, off-chain. We\'ve shipped audited smart contracts, custodial systems, and consumer Web3 apps since 2020.',
    items: [
      'Blockchain Protocol', 'Crypto Bank Development', 'Crypto Wallet Development',
      'Smart Contract Development', 'DeFi Staking Platform', 'Decentralized Exchange',
      'Digital Assets Development', 'Stablecoin Development', 'NFT Development Services',
      'NFT Marketplace Development', 'DApp Development', 'Web3 Development',
      'Blockchain App Development',
    ],
    bg: C.bone, fg: C.slate,
  },
  {
    icon: 'product',
    anchor: 'product', no: '06', title: 'Product & design',
    body: 'Before engineers, designers. Before designers, a discovery. We define what to build before we build it.',
    items: [
      'Product Design', 'MVP Development', 'Wireframe & Prototype',
      'User Experience (UX) Design', 'User Interface (UI) Design',
      'Web Design', 'Graphic Design', 'Discovery Phase', 'Agile Project Management',
    ],
    bg: C.vermillion, fg: C.slate,
  },
  {
    icon: 'games',
    anchor: 'games', no: '07', title: 'Game development',
    body: 'Indie titles to multiplayer worlds, with engines and economies. Unity and Unreal in-house, blockchain-game expertise on call.',
    items: [
      'Mobile Game Development', 'Unity Game Development', 'Unreal Game Development',
      'Blockchain Game Development', '2D Game Development', '3D Game Development',
      'Web3 Game Development', 'Multiplayer Game Development', 'Game Testing',
    ],
    bg: C.slate, fg: C.bone,
  },
  {
    icon: 'cloud',
    anchor: 'cloud', no: '08', title: 'Cloud & DevOps',
    body: 'Strategy, migration, and the infra that keeps systems humming. AWS partners; comfortable across GCP and Azure too.',
    items: ['Cloud Strategy', 'AWS', 'Cloud Migration', 'DevOps'],
    bg: C.bone, fg: C.slate,
  },
];

/* ─── Hero ─────────────────────────────────────────────────── */
function Hero() {
  return (
    <section style={{ background: C.bone, padding: '60px 22px 80px' }}>
      <div className="bp-hero" style={{ maxWidth: 1240, margin: '0 auto' }}>
        <Reveal>
          <Eye color={C.vermillion}>Services</Eye>
          <h1 className="bp-h1" style={{ color: C.slate, margin: '24px 0 0', maxWidth: 880 }}>
            Eight practices.<br />Sixty-six services.<br />One team.
          </h1>
          <p style={{
            fontSize: 19, lineHeight: 1.55, color: C.mute,
            maxWidth: 540, marginTop: 28, fontWeight: 400,
          }}>
            Most engagements draw from two or three of the practices below. Pick the closest fit; we'll bring in the rest as the work asks for it.
          </p>
        </Reveal>
        <Reveal delay={120} className="bp-hero-mark" style={{ display: 'flex', justifyContent: 'flex-end' }}>
          <Mark size={260} animated />
        </Reveal>
      </div>

      {/* anchor jump nav */}
      <Reveal style={{
        maxWidth: 1240, margin: '64px auto 0',
        padding: '24px 0', borderTop: `1px solid ${C.slate}1A`, borderBottom: `1px solid ${C.slate}1A`,
        display: 'flex', gap: 24, flexWrap: 'wrap', alignItems: 'center',
      }}>
        <Eye>Jump to</Eye>
        {CATEGORIES.map((c) => (
          <a key={c.anchor} href={`#${c.anchor}`} style={{
            fontFamily: DISPLAY, fontSize: 14, fontWeight: 500, color: C.slate,
            textDecoration: 'none', transition: 'color 160ms ease',
          }}
          onMouseEnter={(e) => e.currentTarget.style.color = C.vermillion}
          onMouseLeave={(e) => e.currentTarget.style.color = C.slate}
          >{c.title}</a>
        ))}
      </Reveal>
    </section>
  );
}

/* ─── Category block ──────────────────────────────────────── */
function CategoryBlock({ cat, idx }) {
  const isMobile = useMediaQuery('(max-width: 900px)');
  const dark = cat.bg === C.slate;
  const vermillion = cat.bg === C.vermillion;
  const eyebrowColor = dark || vermillion ? (vermillion ? C.slate : C.vermillion) : C.vermillion;
  const subTextColor = dark ? C.mute : (vermillion ? 'rgba(11,15,26,0.7)' : C.mute);
  return (
    <section id={cat.anchor} className="bp-pad" style={{ background: cat.bg, color: cat.fg }}>
      <div style={{ maxWidth: 1240, margin: '0 auto' }}>
        <div style={{
          display: 'grid',
          gridTemplateColumns: isMobile ? '1fr' : '1fr 1.4fr',
          gap: isMobile ? 40 : 64,
          alignItems: 'flex-start',
        }}>
          <Reveal style={{ position: isMobile ? 'static' : 'sticky', top: 100 }}>
            <div style={{
              fontFamily: MONO, fontSize: 12, letterSpacing: '0.16em',
              color: eyebrowColor, fontWeight: 600,
              marginBottom: 20,
            }}>{cat.no} · PRACTICE</div>
            <h2 className="bp-h2-xl" style={{ color: cat.fg, margin: 0, maxWidth: 460 }}>{cat.title}</h2>
            <p style={{
              fontSize: 17, lineHeight: 1.6, color: subTextColor,
              maxWidth: 440, marginTop: 22, fontWeight: 400,
            }}>{cat.body}</p>

            <a href="contact.html" className="bp-btn" style={{
              background: cat.fg, color: cat.bg,
              fontSize: 13, padding: '12px 18px', marginTop: 28,
            }}>Talk to this practice <span style={{ fontFamily: MONO }}>→</span></a>
          </Reveal>

          <Reveal delay={120}>
            <div style={{ display: 'flex', justifyContent: isMobile ? 'flex-start' : 'flex-end', marginBottom: 28 }}>
              <Icon name={cat.icon} size={64} color={dark ? C.bone : C.slate} accent={vermillion ? C.slate : C.vermillion} />
            </div>
            <div style={{
              display: 'grid',
              gridTemplateColumns: isMobile ? '1fr' : 'repeat(2, 1fr)',
              gap: 10,
            }}>
              {cat.items.map((it, i) => (
                <div key={it} style={{
                  background: dark ? C.slate2 : (vermillion ? 'rgba(11,15,26,0.08)' : C.paper),
                  border: dark ? `1px solid ${C.slate3}` : (vermillion ? `1px solid rgba(11,15,26,0.15)` : `1px solid ${C.slate}10`),
                  borderRadius: 10, padding: '16px 20px',
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                  gap: 16,
                  transition: 'background 200ms ease, border-color 200ms ease, transform 200ms ease',
                }}
                onMouseEnter={(e) => {
                  e.currentTarget.style.borderColor = vermillion ? C.slate : (dark ? C.vermillion : C.vermillion);
                  e.currentTarget.style.transform = 'translateX(4px)';
                }}
                onMouseLeave={(e) => {
                  e.currentTarget.style.borderColor = dark ? C.slate3 : (vermillion ? 'rgba(11,15,26,0.15)' : `${C.slate}10`);
                  e.currentTarget.style.transform = 'translateX(0)';
                }}
                >
                  <div style={{
                    fontFamily: DISPLAY, fontSize: 16, fontWeight: 500,
                    letterSpacing: '-0.01em', color: cat.fg,
                  }}>{it}</div>
                  <div style={{
                    fontFamily: MONO, fontSize: 10, letterSpacing: '0.08em',
                    color: dark ? C.mute : (vermillion ? 'rgba(11,15,26,0.6)' : C.mute),
                  }}>{String(i + 1).padStart(2, '0')}</div>
                </div>
              ))}
            </div>
          </Reveal>
        </div>
      </div>
    </section>
  );
}

/* ─── CTA ─────────────────────────────────────────────────── */
function CTA() {
  return (
    <section style={{ background: C.slate, color: C.bone, padding: '100px 22px' }}>
      <div className="bp-split" style={{ maxWidth: 1240, margin: '0 auto' }}>
        <Reveal>
          <Eye color={C.vermillion}>Not sure where to start?</Eye>
          <h2 className="bp-h2-xl" style={{ color: C.bone, margin: '24px 0 0', maxWidth: 720 }}>
            Tell us the problem.<br />We'll pick the practice.
          </h2>
          <p style={{
            fontSize: 18, lineHeight: 1.55, color: C.mute,
            maxWidth: 540, marginTop: 22, fontWeight: 400,
          }}>
            A 45-minute call, no slides. You leave with a clear next step, regardless of whether we end up building together.
          </p>
        </Reveal>
        <Reveal delay={120} style={{ display: 'flex', justifyContent: 'flex-end' }}>
          <a href="contact.html" className="bp-btn" style={{
            background: C.vermillion, color: C.slate,
            padding: '18px 28px', fontSize: 16,
          }}>Schedule the call <span style={{ fontFamily: MONO }}>→</span></a>
        </Reveal>
      </div>
    </section>
  );
}

/* ─── App ─────────────────────────────────────────────────── */
function App() {
  return (
    <PageShell active="services">
      <Hero />
      {CATEGORIES.map((c, i) => <CategoryBlock key={c.anchor} cat={c} idx={i + 2} />)}
      <CTA />
    </PageShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
